<div class="container">
  <div class="filters">
    <a class="button" routerLink="/catalog" routerLinkActive="active" [queryParams]="{category: 'Heads'}">Heads</a>
    <a class="button" routerLink="/catalog" routerLinkActive="active" [queryParams]="{category: 'Arms'}">Arms</a>
    <a class="button" routerLink="/catalog" routerLinkActive="active" [queryParams]="{category: 'Torsos'}">Torsos</a>
    <a class="button" routerLink="/catalog" routerLinkActive="active" [queryParams]="{category: 'Bases'}">Bases</a>
    <a class="button" routerLink="/catalog" routerLinkActive="active" [queryParams]="{category: 'null'}">All</a>
  </div>

  <ul class="products">
     @for (product of getProducts(); track $index) {
    <app-product-details
      [product]="product"
      (eventI)="addToCart(product)">
    </app-product-details>
  }
  </ul>

  <input type="text" (keyup)="printKey($event)">
</div>
