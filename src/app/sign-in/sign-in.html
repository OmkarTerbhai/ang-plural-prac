<div class="container">
  <form class="form" #signInForm = "ngForm" (ngSubmit)="onSubmit()">
    <img class="logo" src="/assets/images/logo.png" />
    <div class="sign-in">Sign In</div>
    <div class="sub-text">to acquire awesome bots</div>
    <input
      name="email"
      placeholder="Email Address"
      type="text" 
      [(ngModel)] = "credential.email"
      #email = "ngModel"
      required
      email
    />
    @if (email.touched && email.errors?.['required']) {
      <em class="error">Email is required bro!</em>
    }
    @if (email.touched && email.errors?.['email']) {
      <em class="error">That's not even an email bro!</em>
    }
    <input
      name="password"
      placeholder="Password"
      type="password"
      [(ngModel)] = "credential.password"
      #password = "ngModel"
      required
    />
    @if (password.touched && password.errors?.['required']) {
      <em class="error">Password is required bro!</em>
    }
    <div class="buttons">
      <button type="submit" class="button cta" [disabled] = "signInForm.invalid">
        Sign In
      </button>
    </div>
  </form>
</div>
